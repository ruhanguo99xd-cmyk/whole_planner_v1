# WK10B参数配置文件，暂未验证
load_node:
  ros__parameters:
    crowd.ratio: 2.9755   #推压减速比（推压轴齿轮比推压二轴齿轮）
    crowd.gear_diameter_m: 0.14   # 推压齿轮直径（m）
    crowd.zero_m: 1.338   # 推压零点位置（m）
    hoist.drum_diameter_m: 0.261056  #  提升卷筒直径（m）
    hoist.zero_m: 0.42    # 提升零点位置（m）
    encoder.counts_per_rev: 4528.0  # 编码器每转脉冲数


