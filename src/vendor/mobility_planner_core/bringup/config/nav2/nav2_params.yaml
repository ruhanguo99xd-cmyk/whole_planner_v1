###############################################################################
#                               GLOBAL
###############################################################################
amcl:
  ros__parameters:
    use_sim_time: true
    # TF 配置 - 禁用 AMCL TF 发布，由定位链路发布 map->odom
    publish_tf: false
    tf_broadcast: false
    # 粒子滤波参数
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    min_particles: 500
    max_particles: 2000
    update_min_a: 0.2
    update_min_d: 0.2
    resample_interval: 1
    transform_tolerance: 0.1
    # TF 框架配置
    odom_frame: "odom"
    base_frame_id: "base_link"
    global_frame_id: "map"
    # 地图相关
    map_topic: /map
    # 初始位置设置
    set_initial_pose: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    # 里程计相关参数
    first_map_only: false

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: "/home/ruhanguo/anew_autowalk_v3/src/navigation/map_server/maps/map.yaml"

###############################################################################
#                         COSTMAP COMMON SETTINGS
###############################################################################
global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_frame: "odom"
    width: 800
    height: 340
    origin_x: -20
    origin_y: -8.5
    resolution: 0.05
    footprint: "[ [1.2, 0.8], [1.2, -0.8], [-1.2, -0.8], [-1.2, 0.8] ]"
    rolling_window: false
    track_unknown_space: true
    plugins: [ 'static_layer', 'inflation_layer' ]
    map_subscribe_transient_local: true
    update_frequency: 10.0
    publish_frequency: 5.0
    transform_tolerance: 0.5

    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      # 大车体场景下避免过大膨胀导致可行通道被全部封死
      inflation_radius: 2.0
      cost_scaling_factor: 2.5

local_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: "odom"
    robot_base_frame: "base_link"
    rolling_window: true
    # 局部窗口需要覆盖大半径转弯的有效范围
    width: 18.0
    height: 18.0
    resolution: 0.05
    track_unknown_space: false
    plugins: [ "obstacle_layer", "inflation_layer" ]
    map_subscribe_transient_local: true
    update_frequency: 10.0
    publish_frequency: 10.0
    transform_tolerance: 0.5

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: []

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 1.6
      cost_scaling_factor: 2.8

###############################################################################
#                               PLANNER SERVER
###############################################################################
planner_server:
  ros__parameters:
    expected_planner_frequency: 3.0

    use_sim_time: true
    # planner_plugins: [ "GridBased", "SmacRS" ] #20250107调试修改
    planner_plugins: [ "GridBased" ]

    ###########################################################################
    #   Smac Hybrid (A*) — “2.5D Hybrid Planning”
    #   适用于履带车、轮式差动，支持方向角连续
    ###########################################################################
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: true
      downsampling_factor: 2
      allow_unknown: false
      tolerance: 1.0
      max_iterations: 300000
      max_on_approach_iterations: 2000
      max_planning_time: 3.0

      # 以下是核心约束，请确保没有缩进错误
      motion_model_for_search: "REEDS_SHEPP"
      minimum_turning_radius: 5.0 # 强制 5 米
      angle_quantization_bins: 72 # 5° 分辨率 (360/5=72)

      # 大转弯半径车辆需要允许必要的曲线与少量换向
      non_straight_penalty: 1.4
      change_penalty: 2.0
      reverse_penalty: 1.8
      cost_penalty: 2.0
      cache_obstacle_heuristic: true

      # 解析解参数
      analytic_expansion: True
      analytic_expansion_max_length: 30.0

      lookup_table_size: 21.0
      smooth_path: True
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 0.004
        do_refinement: true

    ###########################################################################
    #   Smac Reeds-Shepp — RS 曲率最优轨迹
    #   你之前说过使用 RS，这里完整开启
    ###########################################################################
    SmacRS:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      allow_unknown: true
      use_quasi_sharp_turning: false

      # RS 参数
      analytic_expansion: true
      minimum_turning_radius: 5.0
      motion_model_for_search: "REEDS_SHEPP"

      lookup_table_size: 5.0
      reverse_penalty: 1.0
      change_penalty: 1.0
      non_straight_penalty: 1.0
      cost_penalty: 2.0

      # lattice表，有默认值，不用填
      primitive_filename: ""

###############################################################################
#                           CONTROLLER SERVER
###############################################################################
controller_server:
  ros__parameters:
    use_sim_time: true
    expected_controller_frequency: 15.0

    progress_checker_plugin: "progress_checker"
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 20.0

    #Configure of Goal checker
    goal_checker_plugins: [ "general_goal_checker" ]
    current_goal_checker: "general_goal_checker"
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.8 # meters
      yaw_goal_tolerance: 0.35 # rad

    controller_plugins: [ "FollowPath" ]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      use_sim_time: true
      desired_linear_vel: 0.6
      max_linear_vel: 0.9
      min_linear_velocity: 0.08

      # 关键修改：允许平移误差，禁止在目标点处为了对准 yaw 而原地转
      use_rotate_to_heading: false
      rotate_to_heading_angular_vel: 0.4
      allow_reversing: true # 必须开启，配合 Planner 的倒车路径
      min_approach_linear_velocity: 0.08

      max_allowed_time_to_collision_ahead: 2.0

      # 大车体降低转向激进性
      lookahead_dist: 3.0
      min_lookahead_dist: 1.2
      lookahead_time: 1.5

      # 限制加速度，保护重型减速机
      max_linear_accel: 0.15
      max_linear_decel: 0.15
      max_angular_accel: 0.08

      # 速度调节
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 5.0
      regulated_linear_scaling_min_speed: 0.08

      # 靠近障碍物减速
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 1.0
      inflation_cost_scaling_factor: 2.8

